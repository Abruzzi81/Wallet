version: '3'

services:
  server:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8081:80"
    volumes:
      - .:/app/
    links:
      - php
    networks:
      - pg-network
  
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    ports:
      - "5434:5432"
    networks:
      - pg-network
    volumes:
      - pg-data-wallet:/var/lib/postgresql
  
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    networks:
      - pg-network
  
  pgadmin-wallet:
    image: dpage/pgadmin4:latest
    container_name: pg-admin-wallet
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    networks:
      - pg-network
  
networks:
  pg-network:

volumes:
  pg-data-wallet: